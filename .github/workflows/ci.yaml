name: VS Code Extension CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================
  # FRONT-END
  # =========================
  frontend-lint:
    name: Front-end · Code Quality Check (Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Verify dependencies & lockfile (npm ci)
        run: npm ci

      - name: Check code quality (ESLint)
        run: npm run lint

  frontend-build:
    name: Front-end · Compile TypeScript
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Verify dependencies & lockfile (npm ci)
        run: npm ci

      - name: Compile TypeScript (UI / Webview)
        run: npm run build

  # =========================
  # BACK-END (VS CODE EXTENSION CORE)
  # =========================
  backend-lint:
    name: Back-end · Code Quality Check (Extension Core Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Verify dependencies & lockfile (npm ci)
        run: npm ci

      - name: Check code quality (ESLint)
        run: npm run lint

  backend-build:
    name: Back-end · Compile TypeScript (VS Code Extension Core)
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: back-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Verify dependencies & lockfile (npm ci)
        run: npm ci

      - name: Compile TypeScript (extension activate / vscode API)
        run: npm run dev
