name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- FRONT-END LINT ----------
      - name: Install & lint front-end
        working-directory: front-end
        run: |
          npm install
          npm run lint

      # ---------- BACK-END LINT ----------
      - name: Install & lint back-end
        working-directory: back-end
        run: |
          npm install
          npm run lint

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- FRONT-END BUILD ----------
      - name: Install & build front-end
        working-directory: ./front-end
        run: |
          npm install
          npm run build

      # ---------- BACK-END BUILD ----------
      - name: Install & build back-end
        working-directory: ./back-end
        run: |
          npm install
          npm run build
