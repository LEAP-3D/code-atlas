name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & lint front-end
        working-directory: front-end
        run: |
          npm ci
          npm run lint

      - name: Install & lint back-end
        working-directory: back-end
        run: |
          npm ci
          npm run lint

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & typecheck front-end
        working-directory: ./front-end
        run: |
          npm ci
          npm run typecheck

      - name: Install & typecheck back-end
        working-directory: ./back-end
        run: |
          npm ci
          npm run typecheck

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & compile front-end
        working-directory: ./front-end
        run: |
          npm ci
          npm run compile

      - name: Run extension integration smoke tests
        working-directory: ./front-end
        run: xvfb-run -a npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, integration-tests]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build front-end
        working-directory: ./front-end
        run: |
          npm ci
          npm run build

      - name: Install & build back-end
        working-directory: ./back-end
        run: |
          npm ci
          npm run build

