<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        overflow: hidden;
      }

      .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: #1a1a1a;
        padding: 16px 24px;
        border-bottom: 1px solid #333;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-left h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .breadcrumb {
        font-size: 12px;
        color: #888;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      .breadcrumb-item {
        cursor: pointer;
        transition: color 0.2s;
      }

      .breadcrumb-item:hover {
        color: #4ec9b0;
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .zoom-controls {
        display: flex;
        gap: 4px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 4px;
      }

      .zoom-btn {
        background: transparent;
        border: none;
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .zoom-btn:hover {
        background: #3a3a3a;
      }

      .zoom-level {
        color: #888;
        font-size: 12px;
        padding: 0 8px;
        min-width: 50px;
        text-align: center;
      }

      .reset-btn {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .reset-btn:hover {
        background: #3a3a3a;
        border-color: #4ec9b0;
      }

      .canvas {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        cursor: grab;
      }

      .canvas.grabbing {
        cursor: grabbing;
      }

      .graph-container {
        position: absolute;
        width: 10000px;
        height: 10000px;
        left: 50%;
        top: 50%;
        transform-origin: center center;
      }

      svg.connections {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .connection-line {
        stroke: #3a3a3a;
        stroke-width: 2;
        fill: none;
        transition: stroke 0.3s;
      }

      .connection-line.highlight {
        stroke: #4ec9b0;
        stroke-width: 3;
      }

      .nodes-layer {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .node {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          opacity 0.3s,
          transform 0.3s;
        z-index: 2;
      }

      .node.focused {
        z-index: 5;
      }

      .node.dimmed {
        opacity: 0.2;
      }

      .node-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
        border: 3px solid #3a3a3a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: all 0.3s;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      .node:hover .node-circle {
        transform: scale(1.15);
        box-shadow: 0 12px 40px rgba(78, 201, 176, 0.3);
      }

      .node.focused .node-circle {
        width: 140px;
        height: 140px;
        border-color: #4ec9b0;
        box-shadow: 0 16px 64px rgba(78, 201, 176, 0.5);
      }

      .node.small .node-circle {
        width: 70px;
        height: 70px;
      }

      .node.folder .node-circle {
        border-color: #f59e0b;
      }

      .node.file .node-circle {
        border-color: #3b82f6;
      }

      .node-icon {
        font-size: 40px;
        margin-bottom: 4px;
        transition: all 0.3s;
      }

      .node.focused .node-icon {
        font-size: 56px;
      }

      .node.small .node-icon {
        font-size: 28px;
        margin-bottom: 0;
      }

      .node-name {
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        text-align: center;
        max-width: 90px;
        word-break: break-word;
        transition: all 0.3s;
        line-height: 1.2;
      }

      .node.focused .node-name {
        font-size: 14px;
        max-width: 130px;
      }

      .node.small .node-name {
        font-size: 10px;
        max-width: 65px;
      }

      .node-badge {
        position: absolute;
        top: 4px;
        right: 4px;
        background: rgba(78, 201, 176, 0.2);
        color: #4ec9b0;
        padding: 3px 7px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }

      .node.small .node-badge {
        font-size: 8px;
        padding: 2px 5px;
      }

      .hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(26, 26, 26, 0.95);
        border: 1px solid #3a3a3a;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 12px;
        color: #888;
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.3s;
      }

      .function-panel {
        position: fixed;
        right: -400px;
        top: 70px;
        bottom: 20px;
        width: 380px;
        background: #1a1a1a;
        border: 1px solid #3a3a3a;
        border-radius: 12px;
        padding: 24px;
        overflow-y: auto;
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 20;
        box-shadow: -8px 0 32px rgba(0, 0, 0, 0.5);
      }

      .function-panel.visible {
        right: 20px;
      }

      .function-panel-header {
        margin-bottom: 20px;
      }

      .function-panel-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .function-panel-subtitle {
        font-size: 12px;
        color: #888;
      }

      .close-panel {
        position: absolute;
        top: 16px;
        right: 16px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
      }

      .close-panel:hover {
        background: #3a3a3a;
        border-color: #4ec9b0;
      }

      .function-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .function-card {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.2s;
      }

      .function-card:hover {
        background: rgba(0, 0, 0, 0.5);
        border-color: #4ec9b0;
      }

      .function-icon {
        font-size: 20px;
      }

      .function-details {
        flex: 1;
        min-width: 0;
      }

      .function-name {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .function-meta {
        font-size: 10px;
        color: #888;
      }

      .canvas::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-left">
          <h1>🗺️ Project Map</h1>
          <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item" onclick="resetView()">Full Map</span>
          </div>
        </div>
        <div class="controls">
          <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomOut()">−</button>
            <div class="zoom-level" id="zoomLevel">100%</div>
            <button class="zoom-btn" onclick="zoomIn()">+</button>
          </div>
          <button class="reset-btn" onclick="resetView()">Reset View</button>
        </div>
      </div>

      <div class="canvas" id="canvas">
        <div class="graph-container" id="graphContainer">
          <svg class="connections" id="connectionsSvg"></svg>
          <div class="nodes-layer" id="nodesContainer"></div>
        </div>
      </div>

      <div class="function-panel" id="functionPanel">
        <button class="close-panel" onclick="closeFunctionPanel()">×</button>
        <div class="function-panel-header" id="panelHeader"></div>
        <div class="function-list" id="functionList"></div>
      </div>

      <div class="hint" id="hint">
        🖱️ Drag to pan • Cmd/Ctrl + Scroll to zoom • Click files to see
        functions
      </div>
    </div>

    <script>
      let roadmapData = window.ROADMAP_DATA || { files: [] };
      console.log("🗺️ [INIT] Roadmap data:", roadmapData);

      let hierarchyData = null;
      let allNodes = [];
      let connections = [];
      let focusedFile = null;
      let scale = 1;
      let translateX = 0;
      let translateY = 0;
      let isDragging = false;
      let startX = 0;
      let startY = 0;

      const MIN_SCALE = 0.1;
      const MAX_SCALE = 3;
      const ZOOM_STEP = 0.15;

      // Build hierarchy
      function buildHierarchy(files) {
        const root = {
          name: "Root",
          type: "folder",
          children: {},
          files: [],
          level: 0,
        };

        const basePath = findBasePath(files);

        files.forEach((file) => {
          let relativePath = file.path.replace(/\\/g, "/");
          if (basePath) {
            relativePath = relativePath.replace(basePath + "/", "");
          }

          const parts = relativePath.split("/").filter((p) => p);
          let current = root;
          let currentLevel = 0;

          for (let i = 0; i < parts.length - 1; i++) {
            const folderName = parts[i];
            if (!current.children[folderName]) {
              current.children[folderName] = {
                name: folderName,
                type: "folder",
                children: {},
                files: [],
                parent: current,
                level: currentLevel + 1,
                path: parts.slice(0, i + 1).join("/"),
              };
            }
            current = current.children[folderName];
            currentLevel++;
          }

          const fileName = parts[parts.length - 1];
          current.files.push({
            name: fileName,
            type: "file",
            fullPath: file.path,
            functions: file.functions || [],
            parent: current,
            level: currentLevel + 1,
            path: relativePath,
          });
        });

        return root;
      }

      function findBasePath(files) {
        if (files.length === 0) return "";
        const paths = files.map((f) => f.path.replace(/\\/g, "/"));
        const parts = paths[0].split("/");
        let commonParts = [];
        for (let i = 0; i < parts.length - 1; i++) {
          const part = parts.slice(0, i + 1).join("/");
          const allMatch = paths.every((p) => p.startsWith(part));
          if (allMatch) {
            commonParts = parts.slice(0, i + 1);
          } else {
            break;
          }
        }
        return commonParts.join("/");
      }

      // Hierarchical tree layout (top-down)
      function calculateTreeLayout(
        node,
        startX = 5000,
        startY = 500,
        level = 0,
      ) {
        const positions = [];
        const horizontalSpacing = 250; // Space between siblings
        const verticalSpacing = 300; // Space between levels

        // Get all items at this level
        const folders = Object.values(node.children || {});
        const files = node.files || [];
        const allItems = [...folders, ...files];

        if (allItems.length === 0) return positions;

        // Calculate total width needed for this level
        const totalWidth = (allItems.length - 1) * horizontalSpacing;
        const currentX = startX - totalWidth / 2;
        const currentY = startY + level * verticalSpacing;

        // Position each item
        allItems.forEach((item, index) => {
          const itemX = currentX + index * horizontalSpacing;
          const itemY = currentY;

          positions.push({
            node: item,
            x: itemX,
            y: itemY,
            level: level + 1,
            parentX: startX,
            parentY: startY,
          });

          // Recursively position children
          if (item.type === "folder") {
            const childPositions = calculateTreeLayout(
              item,
              itemX,
              itemY,
              level + 1,
            );
            positions.push(...childPositions);
          }
        });

        return positions;
      }

      // Render the graph
      function renderGraph() {
        console.log("🎨 Rendering hierarchical graph...");

        const nodesContainer = document.getElementById("nodesContainer");
        const svg = document.getElementById("connectionsSvg");

        nodesContainer.innerHTML = "";
        svg.innerHTML = "";
        allNodes = [];
        connections = [];

        hierarchyData = buildHierarchy(roadmapData.files);
        const positions = calculateTreeLayout(hierarchyData);

        console.log(`📊 Calculated ${positions.length} positions`);

        // Create connections first
        positions.forEach((pos) => {
          if (pos.parentX !== undefined && pos.parentY !== undefined) {
            drawConnection(
              pos.parentX,
              pos.parentY,
              pos.x,
              pos.y,
              getNodeId(pos.node),
              getNodeId(pos.node.parent),
            );
          }
        });

        // Create nodes
        positions.forEach((pos) => {
          const element = createNode(pos.node, pos.x, pos.y);
          nodesContainer.appendChild(element);

          allNodes.push({
            element,
            data: pos.node,
            x: pos.x,
            y: pos.y,
          });
        });

        console.log(`✅ Rendered ${allNodes.length} nodes`);
        updateBreadcrumb("Full Map");
      }

      function getNodeId(node) {
        if (!node) return null;
        return node.type === "folder"
          ? `folder-${node.path || node.name}`
          : `file-${node.path}`;
      }

      function createNode(data, x, y) {
        const node = document.createElement("div");
        node.className = `node ${data.type}`;
        node.style.left = `${x}px`;
        node.style.top = `${y}px`;
        node.style.transform = "translate(-50%, -50%)";

        const icon = data.type === "folder" ? "📁" : "📄";
        const badge =
          data.type === "folder"
            ? countFiles(data)
            : data.functions?.length || 0;

        node.innerHTML = `
          <div class="node-circle">
            ${badge > 0 ? `<div class="node-badge">${badge}</div>` : ""}
            <div class="node-icon">${icon}</div>
            <div class="node-name">${data.name}</div>
          </div>
        `;

        if (data.type === "file") {
          node.onclick = (e) => {
            e.stopPropagation();
            focusOnFile(data);
          };
        }

        return node;
      }

      function countFiles(folder) {
        let count = folder.files?.length || 0;
        Object.values(folder.children || {}).forEach((child) => {
          count += countFiles(child);
        });
        return count;
      }

      function drawConnection(x1, y1, x2, y2, childId, parentId) {
        const svg = document.getElementById("connectionsSvg");

        // Draw a curved path (Bezier curve)
        const path = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path",
        );

        const midY = (y1 + y2) / 2;
        const d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;

        path.setAttribute("d", d);
        path.classList.add("connection-line");
        path.dataset.childId = childId;
        path.dataset.parentId = parentId;

        svg.appendChild(path);
        connections.push({ line: path, childId, parentId });
      }

      function focusOnFile(fileData) {
        console.log("🎯 Focusing on file:", fileData.name);

        focusedFile = fileData;

        // Get all nodes in the hierarchy
        const relevantNodeIds = new Set();
        relevantNodeIds.add(getNodeId(fileData));

        // Add all ancestors
        let current = fileData.parent;
        while (current) {
          relevantNodeIds.add(getNodeId(current));
          current = current.parent;
        }

        // Add all siblings
        if (fileData.parent) {
          fileData.parent.files?.forEach((file) => {
            relevantNodeIds.add(getNodeId(file));
          });
        }

        console.log("Relevant nodes:", relevantNodeIds);

        // Update nodes
        allNodes.forEach((nodeObj) => {
          const nodeId = getNodeId(nodeObj.data);
          const isFile = nodeId === getNodeId(fileData);
          const isRelevant = relevantNodeIds.has(nodeId);

          if (isFile) {
            nodeObj.element.classList.add("focused");
            nodeObj.element.classList.remove("dimmed", "small");
          } else if (isRelevant) {
            nodeObj.element.classList.add("small");
            nodeObj.element.classList.remove("dimmed", "focused");
          } else {
            nodeObj.element.classList.add("dimmed");
            nodeObj.element.classList.remove("focused", "small");
          }
        });

        // Highlight connections
        connections.forEach(({ line, childId, parentId }) => {
          const isRelevant =
            relevantNodeIds.has(childId) || relevantNodeIds.has(parentId);
          if (isRelevant) {
            line.classList.add("highlight");
          } else {
            line.classList.remove("highlight");
          }
        });

        showFunctionPanel(fileData);

        const pathParts = [];
        current = fileData;
        while (current && current.name !== "Root") {
          pathParts.unshift(current.name);
          current = current.parent;
        }
        updateBreadcrumb(pathParts.join(" / "));
      }

      function showFunctionPanel(fileData) {
        const panel = document.getElementById("functionPanel");
        const header = document.getElementById("panelHeader");
        const list = document.getElementById("functionList");

        header.innerHTML = `
          <div class="function-panel-title">📄 ${fileData.name}</div>
          <div class="function-panel-subtitle">${fileData.functions?.length || 0} functions</div>
        `;

        list.innerHTML =
          fileData.functions
            ?.map(
              (fn) => `
          <div class="function-card">
            <div class="function-icon">${getFunctionIcon(fn.name)}</div>
            <div class="function-details">
              <div class="function-name">${fn.name}</div>
              <div class="function-meta">
                ${
                  fn.calls && fn.calls.length > 0
                    ? `Calls: ${fn.calls.slice(0, 2).join(", ")}${fn.calls.length > 2 ? "..." : ""}`
                    : "No dependencies"
                }
              </div>
            </div>
          </div>
        `,
            )
            .join("") || "<p style='color: #666;'>No functions found</p>";

        panel.classList.add("visible");
      }

      function closeFunctionPanel() {
        document.getElementById("functionPanel").classList.remove("visible");
        resetView();
      }

      function getFunctionIcon(name) {
        const lower = name.toLowerCase();
        if (lower.startsWith("use")) return "🪝";
        if (lower.startsWith("handle")) return "🎯";
        if (lower.includes("fetch") || lower.includes("api")) return "📡";
        if (lower.includes("render")) return "🎨";
        if (lower.includes("analyze") || lower.includes("build")) return "⚙️";
        return "⚡";
      }

      function resetView() {
        focusedFile = null;
        scale = 1;
        translateX = 0;
        translateY = 0;

        allNodes.forEach((nodeObj) => {
          nodeObj.element.classList.remove("focused", "dimmed", "small");
        });

        connections.forEach(({ line }) => {
          line.classList.remove("highlight");
        });

        updateTransform();
        updateBreadcrumb("Full Map");
        document.getElementById("functionPanel").classList.remove("visible");
      }

      function updateBreadcrumb(text) {
        document.getElementById("breadcrumb").innerHTML = `
          <span class="breadcrumb-item" onclick="resetView()">${text}</span>
        `;
      }

      function zoomIn() {
        const newScale = Math.min(scale + ZOOM_STEP, MAX_SCALE);
        setZoom(newScale);
      }

      function zoomOut() {
        const newScale = Math.max(scale - ZOOM_STEP, MIN_SCALE);
        setZoom(newScale);
      }

      function setZoom(newScale) {
        scale = newScale;
        updateTransform();
        document.getElementById("zoomLevel").textContent =
          `${Math.round(scale * 100)}%`;
      }

      function updateTransform() {
        const container = document.getElementById("graphContainer");
        container.style.transform = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
      }

      const canvas = document.getElementById("canvas");

      // Figma-style controls: drag to pan, cmd/ctrl + wheel to zoom
      canvas.addEventListener("mousedown", (e) => {
        if (e.target === canvas || e.target.closest("#graphContainer")) {
          isDragging = true;
          startX = e.clientX - translateX;
          startY = e.clientY - translateY;
          canvas.classList.add("grabbing");
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        if (isDragging) {
          translateX = e.clientX - startX;
          translateY = e.clientY - startY;
          updateTransform();
        }
      });

      canvas.addEventListener("mouseup", () => {
        isDragging = false;
        canvas.classList.remove("grabbing");
      });

      canvas.addEventListener("mouseleave", () => {
        isDragging = false;
        canvas.classList.remove("grabbing");
      });

      // Figma-style zoom: only with Cmd/Ctrl
      canvas.addEventListener(
        "wheel",
        (e) => {
          // Check if Cmd (Mac) or Ctrl (Windows/Linux) is pressed
          if (e.metaKey || e.ctrlKey) {
            e.preventDefault();

            // Zoom sensitivity (reduced from previous version)
            const delta = e.deltaY > 0 ? -ZOOM_STEP * 0.5 : ZOOM_STEP * 0.5;
            const newScale = Math.max(
              MIN_SCALE,
              Math.min(MAX_SCALE, scale + delta),
            );
            setZoom(newScale);
          } else {
            // Pan without modifier keys
            e.preventDefault();
            translateX -= e.deltaX;
            translateY -= e.deltaY;
            updateTransform();
          }
        },
        { passive: false },
      );

      // Initialize
      if (roadmapData && roadmapData.files && roadmapData.files.length > 0) {
        console.log(`✅ Found ${roadmapData.files.length} files`);
        renderGraph();

        setTimeout(() => {
          const hint = document.getElementById("hint");
          hint.style.opacity = "0";
          setTimeout(() => (hint.style.display = "none"), 300);
        }, 5000);
      } else {
        console.error("❌ No files found");
        document.getElementById("nodesContainer").innerHTML =
