<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        overflow: hidden;
      }

      .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: #1a1a1a;
        padding: 16px 24px;
        border-bottom: 1px solid #333;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-left h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .breadcrumb {
        font-size: 12px;
        color: #888;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      .breadcrumb-item {
        cursor: pointer;
        transition: color 0.2s;
      }

      .breadcrumb-item:hover {
        color: #4ec9b0;
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .zoom-controls {
        display: flex;
        gap: 4px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 4px;
      }

      .zoom-btn {
        background: transparent;
        border: none;
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .zoom-btn:hover {
        background: #3a3a3a;
      }

      .zoom-level {
        color: #888;
        font-size: 12px;
        padding: 0 8px;
        min-width: 50px;
        text-align: center;
      }

      .reset-btn {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .reset-btn:hover {
        background: #3a3a3a;
        border-color: #4ec9b0;
      }

      .canvas {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        cursor: grab;
      }

      .canvas.grabbing {
        cursor: grabbing;
      }

      .graph-container {
        position: absolute;
        width: 10000px;
        height: 10000px;
        left: 50%;
        top: 50%;
        transform-origin: center center;
      }

      svg.connections {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .connection-line {
        stroke: #4a4a4a;
        stroke-width: 2;
        fill: none;
        transition:
          stroke 0.3s,
          stroke-width 0.3s;
        opacity: 0.6;
      }

      .connection-line.highlight {
        stroke: #4ec9b0;
        stroke-width: 3;
        opacity: 1;
      }

      /* ✅ NEW: Arrow marker for connections */
      .connection-arrow {
        fill: #4a4a4a;
        transition: fill 0.3s;
      }

      .connection-line.highlight + .connection-arrow {
        fill: #4ec9b0;
      }

      .nodes-layer {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .node {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          opacity 0.3s,
          transform 0.3s;
        z-index: 2;
      }

      .node.focused {
        z-index: 5;
      }

      .node.dimmed {
        opacity: 0.2;
      }

      .node-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
        border: 3px solid #3a3a3a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: all 0.3s;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      .node:hover .node-circle {
        transform: scale(1.15);
        box-shadow: 0 12px 40px rgba(78, 201, 176, 0.3);
      }

      .node.focused .node-circle {
        width: 140px;
        height: 140px;
        border-color: #4ec9b0;
        box-shadow: 0 16px 64px rgba(78, 201, 176, 0.5);
      }

      .node.small .node-circle {
        width: 70px;
        height: 70px;
      }

      .node.folder .node-circle {
        border-color: #f59e0b;
      }

      .node.file .node-circle {
        border-color: #3b82f6;
      }

      .node.file.has-error .node-circle {
        border-color: #ef4444;
        background: linear-gradient(135deg, #2a1a1a 0%, #3a2020 100%);
        box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
      }

      .node.file.has-error:hover .node-circle {
        box-shadow: 0 12px 40px rgba(239, 68, 68, 0.5);
      }

      .node.file.has-error .node-badge {
        background: rgba(239, 68, 68, 0.3);
        color: #ef4444;
      }

      .node-icon {
        font-size: 40px;
        margin-bottom: 4px;
        transition: all 0.3s;
      }

      .node.focused .node-icon {
        font-size: 56px;
      }

      .node.small .node-icon {
        font-size: 28px;
        margin-bottom: 0;
      }

      .node-name {
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        text-align: center;
        max-width: 90px;
        word-break: break-word;
        transition: all 0.3s;
        line-height: 1.2;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .node.focused .node-name {
        font-size: 14px;
        max-width: 130px;
        -webkit-line-clamp: 3;
      }

      .node.small .node-name {
        font-size: 8px;
        max-width: 60px;
        line-height: 1.1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .node-badge {
        position: absolute;
        top: 4px;
        right: 4px;
        background: rgba(78, 201, 176, 0.2);
        color: #4ec9b0;
        padding: 3px 7px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }

      .node.small .node-badge {
        font-size: 7px;
        padding: 1px 4px;
        top: 2px;
        right: 2px;
      }

      .error-badge-indicator {
        position: absolute;
        top: -8px;
        left: -8px;
        background: #ef4444;
        color: white;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: bold;
        z-index: 10;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      .hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(26, 26, 26, 0.95);
        border: 1px solid #3a3a3a;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 12px;
        color: #888;
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.3s;
      }

      .function-panel {
        position: fixed;
        right: -400px;
        top: 70px;
        bottom: 20px;
        width: 380px;
        background: #1a1a1a;
        border: 1px solid #3a3a3a;
        border-radius: 12px;
        padding: 24px;
        overflow-y: auto;
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 20;
        box-shadow: -8px 0 32px rgba(0, 0, 0, 0.5);
      }

      .function-panel.visible {
        right: 20px;
      }

      .function-panel-header {
        margin-bottom: 20px;
      }

      .function-panel-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .function-panel-subtitle {
        font-size: 12px;
        color: #888;
      }

      .close-panel {
        position: absolute;
        top: 16px;
        right: 16px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
      }

      .close-panel:hover {
        background: #3a3a3a;
        border-color: #4ec9b0;
      }

      .function-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .function-card {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.2s;
        cursor: pointer;
      }

      .function-card:hover {
        background: rgba(78, 201, 176, 0.1);
        border-color: #4ec9b0;
        transform: translateX(4px);
      }

      .function-card:active {
        transform: translateX(2px) scale(0.98);
      }

      .function-icon {
        font-size: 20px;
      }

      .function-details {
        flex: 1;
        min-width: 0;
      }

      .function-name {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .function-meta {
        font-size: 10px;
        color: #888;
      }

      .function-goto {
        color: #4ec9b0;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .function-card:hover .function-goto {
        opacity: 1;
      }

      .canvas::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
      }

      .error-warning {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid #ef4444;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .error-warning.clickable {
        cursor: pointer;
        transition: all 0.2s;
      }

      .error-warning.clickable:hover {
        background: rgba(239, 68, 68, 0.25);
        border-color: #f87171;
        transform: scale(1.02);
      }

      .error-warning-icon {
        font-size: 24px;
      }

      .error-warning-text {
        flex: 1;
      }

      .error-warning-title {
        font-size: 14px;
        font-weight: 600;
        color: #ef4444;
        margin-bottom: 4px;
      }

      .error-warning-subtitle {
        font-size: 12px;
        color: #fca5a5;
      }

      .error-warning.clickable .error-warning-subtitle {
        font-weight: 600;
      }

      /* ERROR DETAIL PANEL */
      .error-detail-panel {
        position: fixed;
        right: -450px;
        top: 70px;
        bottom: 20px;
        width: 430px;
        background: #1a1a1a;
        border: 2px solid #ef4444;
        border-radius: 12px;
        padding: 24px;
        overflow-y: auto;
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 25;
        box-shadow: -8px 0 32px rgba(239, 68, 68, 0.4);
      }

      .error-detail-panel.visible {
        right: 20px;
      }

      .error-panel-header {
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid #3a3a3a;
      }

      .error-panel-title {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .error-icon-large {
        font-size: 32px;
      }

      .error-panel-title-text {
        font-size: 18px;
        font-weight: 600;
        color: #ef4444;
        margin-bottom: 4px;
      }

      .error-panel-subtitle {
        font-size: 13px;
        color: #888;
      }

      .error-panel-content {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .error-section {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 16px;
      }

      .error-section-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .error-message-box {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid #ef4444;
        border-radius: 6px;
        padding: 12px;
        font-size: 13px;
        line-height: 1.5;
        color: #fca5a5;
        font-family: "Courier New", monospace;
      }

      .error-location {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .error-location:hover {
        background: rgba(78, 201, 176, 0.1);
        border-color: #4ec9b0;
        transform: translateX(4px);
      }

      .error-location-icon {
        font-size: 24px;
      }

      .error-location-details {
        flex: 1;
        min-width: 0;
      }

      .error-location-file {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 4px;
      }

      .error-location-line {
        font-size: 12px;
        color: #888;
        margin-bottom: 2px;
      }

      .error-location-function {
        font-size: 11px;
        color: #4ec9b0;
      }

      .error-suggestion {
        font-size: 13px;
        line-height: 1.6;
        color: #4ec9b0;
        background: rgba(78, 201, 176, 0.1);
        border-left: 3px solid #4ec9b0;
        padding: 12px;
        border-radius: 4px;
      }

      .error-related-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .error-related-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .error-related-item:hover {
        background: rgba(78, 201, 176, 0.1);
        border-color: #4ec9b0;
        transform: translateX(4px);
      }

      .error-related-icon {
        font-size: 18px;
      }

      .error-related-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        color: #e0e0e0;
      }

      .btn-debug-flow {
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-debug-flow:hover {
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
      }

      .btn-debug-flow:active {
        transform: translateY(0);
      }

      .close-error-panel {
        position: absolute;
        top: 16px;
        right: 16px;
        background: #2a2a2a;
        border: 1px solid #ef4444;
        color: #ef4444;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
        z-index: 10;
      }

      .close-error-panel:hover {
        background: #ef4444;
        color: white;
        transform: rotate(90deg);
      }

      .error-goto {
        color: #4ec9b0;
        font-size: 18px;
        opacity: 0.7;
        transition: all 0.2s;
      }

      .error-location:hover .error-goto {
        opacity: 1;
        transform: translateX(4px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-left">
          <h1>🗺️ Project Map</h1>
          <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item" onclick="resetView()">Full Map</span>
          </div>
        </div>
        <div class="controls">
          <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomOut()">−</button>
            <div class="zoom-level" id="zoomLevel">50%</div>
            <button class="zoom-btn" onclick="zoomIn()">+</button>
          </div>
          <button class="reset-btn" onclick="resetView()">Reset View</button>
        </div>
      </div>

      <div class="canvas" id="canvas">
        <div class="graph-container" id="graphContainer">
          <svg class="connections" id="connectionsSvg">
            <defs>
              <marker
                id="arrowhead"
                markerWidth="10"
                markerHeight="10"
                refX="9"
                refY="3"
                orient="auto"
              >
                <polygon points="0 0, 10 3, 0 6" class="connection-arrow" />
              </marker>
              <marker
                id="arrowhead-highlight"
                markerWidth="10"
                markerHeight="10"
                refX="9"
                refY="3"
                orient="auto"
              >
                <polygon points="0 0, 10 3, 0 6" fill="#4ec9b0" />
              </marker>
            </defs>
          </svg>
          <div class="nodes-layer" id="nodesContainer"></div>
        </div>
      </div>

      <!-- ✅ FIX: Error Detail Panel added to HTML body -->
      <div class="error-detail-panel" id="errorDetailPanel">
        <button class="close-error-panel" onclick="closeErrorPanel()">×</button>
        <div class="error-panel-header" id="errorPanelHeader"></div>
        <div class="error-panel-content" id="errorPanelContent"></div>
      </div>

      <div class="function-panel" id="functionPanel">
        <button class="close-panel" onclick="closeFunctionPanel()">×</button>
        <div class="function-panel-header" id="panelHeader"></div>
        <div class="function-list" id="functionList"></div>
      </div>

      <div class="hint" id="hint">
        🖱️ Drag to pan • Cmd/Ctrl + Scroll to zoom • Click files to see
        functions • Click function to go to code • 🔴 Red = Errors
      </div>
    </div>

    <script>
      const vscode = acquireVsCodeApi();

      function goToFunction(filePath, line) {
        console.log("🎯 Going to function:", filePath, "line:", line);
        vscode.postMessage({
          command: "goToFunction",
          filePath: filePath,
          line: line || 1,
        });
      }

      // ============================================
      // ERROR DETAIL PANEL FUNCTIONS
      // ============================================

      function showErrorDetail(errorData) {
        console.log("❌ Showing error detail:", errorData);

        document.getElementById("functionPanel").classList.remove("visible");

        const errorPanel = document.getElementById("errorDetailPanel");
        const header = document.getElementById("errorPanelHeader");
        const content = document.getElementById("errorPanelContent");

        header.innerHTML = `
    <div class="error-panel-title">
      <span class="error-icon-large">⚠️</span>
      <div>
        <div class="error-panel-title-text">${errorData.errorType || "Error"}</div>
        <div class="error-panel-subtitle">${errorData.fileName}:${errorData.line}</div>
      </div>
    </div>
  `;

        content.innerHTML = `
    <div class="error-section">
      <div class="error-section-title">📋 Error Message</div>
      <div class="error-message-box">${escapeHtml(errorData.message)}</div>
    </div>
    
    <div class="error-section">
      <div class="error-section-title">📍 Location</div>
      <div class="error-location" onclick="goToFunction('${escapeHtml(errorData.filePath)}', ${errorData.line})">
        <div class="error-location-icon">📄</div>
        <div class="error-location-details">
          <div class="error-location-file">${errorData.fileName}</div>
          <div class="error-location-line">Line ${errorData.line}, Column ${errorData.column || 1}</div>
          <div class="error-location-function">in function: ${errorData.functionName}</div>
        </div>
        <div class="error-goto">→</div>
      </div>
    </div>
    
    <div class="error-section">
      <div class="error-section-title">💡 Suggestion</div>
      <div class="error-suggestion">${errorData.suggestion || "Review the error message for guidance."}</div>
    </div>
    
    ${
      errorData.relatedFunctions && errorData.relatedFunctions.length > 0
        ? `
    <div class="error-section">
      <div class="error-section-title">🔗 Related Functions (${errorData.relatedFunctions.length})</div>
      <div class="error-related-list">
        ${errorData.relatedFunctions
          .map(
            (func) => `
          <div class="error-related-item" onclick="searchFunction('${escapeHtml(func)}')">
            <div class="error-related-icon">⚡</div>
            <div class="error-related-name">${escapeHtml(func)}</div>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>
    `
        : ""
    }
    
    ${
      errorData.relatedFiles && errorData.relatedFiles.length > 0
        ? `
    <div class="error-section">
      <div class="error-section-title">📂 Related Files (${errorData.relatedFiles.length})</div>
      <div class="error-related-list">
        ${errorData.relatedFiles
          .map((filePath) => {
            const fileName = filePath.split(/[/\\]/).pop() || filePath;
            return `
          <div class="error-related-item" onclick="goToFunction('${escapeHtml(filePath)}', 1)">
            <div class="error-related-icon">📄</div>
            <div class="error-related-name">${escapeHtml(fileName)}</div>
          </div>
        `;
          })
          .join("")}
      </div>
    </div>
    `
        : ""
    }
    
    <div class="error-section">
      <button class="btn-debug-flow" onclick="openDebugFlow('${escapeHtml(errorData.filePath)}', '${escapeHtml(errorData.functionName)}')">
        🔍 Show Debug Execution Flow
      </button>
    </div>
  `;

        errorPanel.classList.add("visible");
      }

      function closeErrorPanel() {
        document.getElementById("errorDetailPanel").classList.remove("visible");
      }

      function searchFunction(functionName) {
        console.log("🔍 Searching for function:", functionName);
        vscode.postMessage({
          command: "searchFunction",
          functionName: functionName,
        });
      }

      function openDebugFlow(filePath, functionName) {
        console.log("🐞 Opening debug flow:", filePath, functionName);
        vscode.postMessage({
          command: "showDebugFlow",
          filePath: filePath,
          functionName: functionName,
        });
      }

      function requestErrorDetails(filePath) {
        console.log("📨 Requesting error details for:", filePath);
        vscode.postMessage({
          command: "getErrorDetails",
          filePath: filePath,
        });
      }

      window.addEventListener("message", (event) => {
        const message = event.data;

        if (message.command === "displayErrorDetails") {
          console.log("📥 Received error details:", message.errors);

          if (message.errors && message.errors.length > 0) {
            showErrorDetail(message.errors[0]);
          } else {
            console.log("No errors found");
          }
        }
      });

      // ============================================
      // GRAPH DATA AND RENDERING
      // ============================================

      let roadmapData = window.ROADMAP_DATA || { files: [] };
      console.log("🗺️ [INIT] Roadmap data:", roadmapData);

      console.log("🔍 [INIT] Checking for files with errors...");
      const filesWithErrors = roadmapData.files.filter(
        (f) => f.errorCount && f.errorCount > 0,
      );
      console.log(`   Found ${filesWithErrors.length} files with errors:`);
      filesWithErrors.forEach((f) => {
        console.log(`      ❌ ${f.name}: ${f.errorCount} error(s)`);
      });

      let hierarchyData = null;
      let allNodes = [];
      let connections = [];
      let focusedFile = null;
      let scale = 0.5;
      let translateX = 0;
      let translateY = 0;
      let isDragging = false;
      let startX = 0;
      let startY = 0;

      const MIN_SCALE = 0.1;
      const MAX_SCALE = 3;
      const ZOOM_STEP = 0.15;

      function buildHierarchy(files) {
        const basePath = findBasePath(files);
        const pathParts = basePath ? basePath.split("/").filter((p) => p) : [];
        const projectName =
          pathParts.length > 0 ? pathParts[pathParts.length - 1] : "Project";

        console.log("🔍 buildHierarchy:");
        console.log("  basePath:", basePath);
        console.log("  projectName:", projectName);

        const root = {
          name: projectName,
          type: "folder",
          children: {},
          files: [],
          level: 0,
          path: projectName,
          parent: null,
        };

        files.forEach((file, index) => {
          let relativePath = file.path.replace(/\\/g, "/");

          if (basePath) {
            const baseWithSlash = basePath.endsWith("/")
              ? basePath
              : basePath + "/";
            if (relativePath.startsWith(baseWithSlash)) {
              relativePath = relativePath.substring(baseWithSlash.length);
            } else if (relativePath.startsWith(basePath)) {
              relativePath = relativePath.substring(basePath.length);
              if (relativePath.startsWith("/")) {
                relativePath = relativePath.substring(1);
              }
            }
          }

          if (index < 3) {
            console.log(`  File ${index}: ${file.path}`);
            console.log(`    relativePath: ${relativePath}`);
            if (file.errorCount) {
              console.log(`    ❌ Has ${file.errorCount} error(s)`);
            }
          }

          const parts = relativePath.split("/").filter((p) => p);
          if (parts.length === 0) return;

          let current = root;
          let currentLevel = 0;

          for (let i = 0; i < parts.length - 1; i++) {
            const folderName = parts[i];
            if (!current.children[folderName]) {
              current.children[folderName] = {
                name: folderName,
                type: "folder",
                children: {},
                files: [],
                parent: current,
                level: currentLevel + 1,
                path: parts.slice(0, i + 1).join("/"),
              };
            }
            current = current.children[folderName];
            currentLevel++;
          }

          const fileName = parts[parts.length - 1];
          current.files.push({
            name: fileName,
            type: "file",
            fullPath: file.path,
            functions: file.functions || [],
            parent: current,
            level: currentLevel + 1,
            path: relativePath,
            errorCount: file.errorCount || 0,
            color: file.color,
          });
        });

        const childFolders = Object.keys(root.children);
        if (childFolders.length === 1 && root.files.length === 0) {
          const onlyChild = root.children[childFolders[0]];
          onlyChild.name = onlyChild.name;
          onlyChild.parent = null;
          onlyChild.level = 0;
          onlyChild.path = onlyChild.name;
          console.log("  ⚡ Promoting single child to root:", onlyChild.name);
          return onlyChild;
        }

        return root;
      }

      function findBasePath(files) {
        if (files.length === 0) return "";
        const paths = files.map((f) => f.path.replace(/\\/g, "/"));
        const parts = paths[0].split("/").filter((p) => p);
        let commonParts = [];

        for (let i = 0; i < parts.length; i++) {
          const testPath = "/" + parts.slice(0, i + 1).join("/");
          const allMatch = paths.every((p) => p.startsWith(testPath + "/"));

          if (allMatch) {
            commonParts = parts.slice(0, i + 1);
          } else {
            break;
          }
        }

        const result = "/" + commonParts.join("/");
        console.log("  findBasePath result:", result);
        return result;
      }

      function calculateTreeLayout(
        node,
        startX = 5000,
        startY = 500,
        level = 0,
      ) {
        const positions = [];
        const horizontalSpacing = 180;
        const verticalSpacing = 250;

        const folders = Object.values(node.children || {});
        const files = node.files || [];
        const allItems = [...folders, ...files];

        if (allItems.length === 0) return positions;

        function calculateSubtreeWidth(item) {
          if (item.type === "file") {
            return horizontalSpacing;
          }

          const subFolders = Object.values(item.children || {});
          const subFiles = item.files || [];
          const allSubItems = [...subFolders, ...subFiles];

          if (allSubItems.length === 0) {
            return horizontalSpacing;
          }

          let totalWidth = 0;
          allSubItems.forEach((subItem) => {
            totalWidth += calculateSubtreeWidth(subItem);
          });

          return Math.max(totalWidth, horizontalSpacing);
        }

        const itemWidths = allItems.map((item) => calculateSubtreeWidth(item));
        const totalWidth = itemWidths.reduce((sum, w) => sum + w, 0);

        let currentX = startX - totalWidth / 2;
        const currentY = startY + verticalSpacing;

        allItems.forEach((item, index) => {
          const itemWidth = itemWidths[index];
          const itemX = currentX + itemWidth / 2;
          const itemY = currentY;

          positions.push({
            node: item,
            x: itemX,
            y: itemY,
            level: level + 1,
            parentX: startX,
            parentY: startY,
          });

          if (item.type === "folder") {
            const childPositions = calculateTreeLayout(
              item,
              itemX,
              itemY,
              level + 1,
            );
            positions.push(...childPositions);
          }

          currentX += itemWidth;
        });

        return positions;
      }

      function renderGraph() {
        console.log("🎨 Rendering hierarchical graph...");

        const nodesContainer = document.getElementById("nodesContainer");
        const svg = document.getElementById("connectionsSvg");

        nodesContainer.innerHTML = "";

        // ✅ FIX: Keep defs when clearing SVG
        const defs = svg.querySelector("defs");
        svg.innerHTML = "";
        if (defs) svg.appendChild(defs);

        allNodes = [];
        connections = [];

        hierarchyData = buildHierarchy(roadmapData.files);
        const positions = calculateTreeLayout(hierarchyData);

        console.log(`📊 Calculated ${positions.length} positions`);

        const rootElement = createNode(hierarchyData, 5000, 500);
        nodesContainer.appendChild(rootElement);
        allNodes.push({
          element: rootElement,
          data: hierarchyData,
          x: 5000,
          y: 500,
        });

        // ✅ FIX: Draw connections with arrows
        positions.forEach((pos) => {
          if (pos.parentX !== undefined && pos.parentY !== undefined) {
            drawConnection(
              pos.parentX,
              pos.parentY,
              pos.x,
              pos.y,
              getNodeId(pos.node),
              getNodeId(pos.node.parent),
            );
          }
        });

        positions.forEach((pos) => {
          const element = createNode(pos.node, pos.x, pos.y);
          nodesContainer.appendChild(element);

          allNodes.push({
            element,
            data: pos.node,
            x: pos.x,
            y: pos.y,
          });
        });

        console.log(
          `✅ Rendered ${allNodes.length} nodes and ${connections.length} connections`,
        );
        updateBreadcrumb("Full Map");
      }

      function getNodeId(node) {
        if (!node) return null;
        return node.type === "folder"
          ? `folder-${node.path || node.name}`
          : `file-${node.path}`;
      }

      function createNode(data, x, y) {
        const node = document.createElement("div");
        node.className = `node ${data.type}`;

        if (data.type === "file" && data.errorCount && data.errorCount > 0) {
          node.classList.add("has-error");
          console.log(
            `   🔴 Creating error node: ${data.name} (${data.errorCount} errors)`,
          );
        }

        node.style.left = `${x}px`;
        node.style.top = `${y}px`;
        node.style.transform = "translate(-50%, -50%)";

        const icon = data.type === "folder" ? "📁" : "📄";
        const badge =
          data.type === "folder"
            ? countFiles(data)
            : data.functions?.length || 0;

        const errorIndicator =
          data.type === "file" && data.errorCount && data.errorCount > 0
            ? `<div class="error-badge-indicator">!</div>`
            : "";

        node.innerHTML = `
          <div class="node-circle">
            ${errorIndicator}
            ${badge > 0 ? `<div class="node-badge">${badge}</div>` : ""}
            <div class="node-icon">${icon}</div>
            <div class="node-name">${data.name}</div>
          </div>
        `;

        if (data.type === "file") {
          node.onclick = (e) => {
            e.stopPropagation();
            focusOnFile(data);
          };
        }

        return node;
      }

      function countFiles(folder) {
        let count = folder.files?.length || 0;
        Object.values(folder.children || {}).forEach((child) => {
          count += countFiles(child);
        });
        return count;
      }

      // ✅ FIX: Improved connection drawing with arrows
      function drawConnection(x1, y1, x2, y2, childId, parentId) {
        const svg = document.getElementById("connectionsSvg");

        const path = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path",
        );

        const midY = (y1 + y2) / 2;
        const d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;

        path.setAttribute("d", d);
        path.setAttribute("marker-end", "url(#arrowhead)");
        path.classList.add("connection-line");
        path.dataset.childId = childId;
        path.dataset.parentId = parentId;

        svg.appendChild(path);
        connections.push({ line: path, childId, parentId });

        console.log(`🔗 Drew connection: ${parentId} → ${childId}`);
      }

      function focusOnFile(fileData) {
        console.log("🎯 Focusing on file:", fileData.name);

        if (fileData.errorCount && fileData.errorCount > 0) {
          console.log(`   ❌ File has ${fileData.errorCount} error(s)`);
        }

        focusedFile = fileData;

        const relevantNodeIds = new Set();
        relevantNodeIds.add(getNodeId(fileData));

        let current = fileData.parent;
        while (current) {
          relevantNodeIds.add(getNodeId(current));
          current = current.parent;
        }

        console.log("Relevant nodes:", relevantNodeIds);

        allNodes.forEach((nodeObj) => {
          const nodeId = getNodeId(nodeObj.data);
          const isFile = nodeId === getNodeId(fileData);
          const isRelevant = relevantNodeIds.has(nodeId);

          if (isFile) {
            nodeObj.element.classList.add("focused");
            nodeObj.element.classList.remove("dimmed", "small");
          } else if (isRelevant) {
            nodeObj.element.classList.add("small");
            nodeObj.element.classList.remove("dimmed", "focused");
          } else {
            nodeObj.element.classList.add("dimmed");
            nodeObj.element.classList.remove("focused", "small");
          }
        });

        connections.forEach(({ line, childId, parentId }) => {
          const isRelevant =
            relevantNodeIds.has(childId) && relevantNodeIds.has(parentId);
          if (isRelevant) {
            line.classList.add("highlight");
            line.setAttribute("marker-end", "url(#arrowhead-highlight)");
          } else {
            line.classList.remove("highlight");
            line.setAttribute("marker-end", "url(#arrowhead)");
          }
        });

        showFunctionPanel(fileData);

        const pathParts = [];
        current = fileData;
        while (current) {
          pathParts.unshift(current.name);
          current = current.parent;
        }
        updateBreadcrumb(pathParts.join(" / "));
      }

      function showFunctionPanel(fileData) {
        const panel = document.getElementById("functionPanel");
        const header = document.getElementById("panelHeader");
        const list = document.getElementById("functionList");

        const errorWarning =
          fileData.errorCount && fileData.errorCount > 0
            ? `
            <div class="error-warning clickable" onclick="requestErrorDetails('${escapeHtml(fileData.fullPath)}')">
              <div class="error-warning-icon">⚠️</div>
              <div class="error-warning-text">
                <div class="error-warning-title">${fileData.errorCount} Error${fileData.errorCount > 1 ? "s" : ""} Found</div>
                <div class="error-warning-subtitle">Click to see error details →</div>
              </div>
            </div>
          `
            : "";

        header.innerHTML = `
          <div class="function-panel-title">📄 ${fileData.name}</div>
          <div class="function-panel-subtitle">${fileData.functions?.length || 0} functions • Click to go to code</div>
          ${errorWarning}
        `;

        list.innerHTML =
          fileData.functions
            ?.map(
              (fn) => `
          <div class="function-card" onclick="goToFunction('${escapeHtml(fileData.fullPath)}', ${fn.startLine || 1})">
            <div class="function-icon">${getFunctionIcon(fn.name)}</div>
            <div class="function-details">
              <div class="function-name">${escapeHtml(fn.name)}</div>
              <div class="function-meta">
                ${fn.startLine ? `Line ${fn.startLine}` : ""}
                ${
                  fn.calls && fn.calls.length > 0
                    ? ` • Calls: ${fn.calls.slice(0, 2).join(", ")}${fn.calls.length > 2 ? "..." : ""}`
                    : ""
                }
              </div>
            </div>
            <div class="function-goto">→</div>
          </div>
        `,
            )
            .join("") || "<p style='color: #666;'>No functions found</p>";

        panel.classList.add("visible");
      }

      function escapeHtml(text) {
        if (!text) return "";
        return text
          .replace(/\\/g, "\\\\")
          .replace(/'/g, "\\'")
          .replace(/"/g, '\\"');
      }

      function closeFunctionPanel() {
        document.getElementById("functionPanel").classList.remove("visible");
        resetView();
      }

      function getFunctionIcon(name) {
        const lower = name.toLowerCase();
        if (lower.startsWith("use")) return "🪝";
        if (lower.startsWith("handle")) return "🎯";
        if (lower.includes("fetch") || lower.includes("api")) return "📡";
        if (lower.includes("render")) return "🎨";
        if (lower.includes("analyze") || lower.includes("build")) return "⚙️";
        return "⚡";
      }

      function resetView() {
        focusedFile = null;

        if (allNodes.length > 0) {
          let minX = Infinity,
            maxX = -Infinity;
          let minY = Infinity,
            maxY = -Infinity;

          allNodes.forEach((nodeObj) => {
            minX = Math.min(minX, nodeObj.x);
            maxX = Math.max(maxX, nodeObj.x);
            minY = Math.min(minY, nodeObj.y);
            maxY = Math.max(maxY, nodeObj.y);
          });

          const graphWidth = maxX - minX + 200;
          const graphHeight = maxY - minY + 200;

          const graphCenterX = (minX + maxX) / 2;
          const graphCenterY = (minY + maxY) / 2;

          const canvasRect = canvas.getBoundingClientRect();
          const canvasCenterX = canvasRect.width / 2;
          const canvasCenterY = canvasRect.height / 2;

          const scaleX = (canvasRect.width * 0.9) / graphWidth;
          const scaleY = (canvasRect.height * 0.9) / graphHeight;
          scale = Math.min(scaleX, scaleY, 1);
          scale = Math.max(scale, MIN_SCALE);

          const containerCenterX = 5000;
          const containerCenterY = 5000;

          translateX =
            canvasCenterX - (graphCenterX - containerCenterX) * scale;
          translateY =
            canvasCenterY - (graphCenterY - containerCenterY) * scale;
        } else {
          scale = 0.5;
          translateX = 0;
          translateY = 0;
        }

        allNodes.forEach((nodeObj) => {
          nodeObj.element.classList.remove("focused", "dimmed", "small");
        });

        connections.forEach(({ line }) => {
          line.classList.remove("highlight");
          line.setAttribute("marker-end", "url(#arrowhead)");
        });

        updateTransform();
        document.getElementById("zoomLevel").textContent =
          `${Math.round(scale * 100)}%`;
        updateBreadcrumb("Full Map");
        document.getElementById("functionPanel").classList.remove("visible");
      }

      function updateBreadcrumb(text) {
        document.getElementById("breadcrumb").innerHTML = `
          <span class="breadcrumb-item" onclick="resetView()">${text}</span>
        `;
      }

      function zoomIn() {
        const newScale = Math.min(scale + ZOOM_STEP, MAX_SCALE);
        setZoom(newScale);
      }

      function zoomOut() {
        const newScale = Math.max(scale - ZOOM_STEP, MIN_SCALE);
        setZoom(newScale);
      }

      function setZoom(newScale) {
        scale = newScale;
        updateTransform();
        document.getElementById("zoomLevel").textContent =
          `${Math.round(scale * 100)}%`;
      }

      function updateTransform() {
        const container = document.getElementById("graphContainer");
        container.style.transform = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
      }

      const canvas = document.getElementById("canvas");

      canvas.addEventListener("mousedown", (e) => {
        if (e.target === canvas || e.target.closest("#graphContainer")) {
          isDragging = true;
          startX = e.clientX - translateX;
          startY = e.clientY - translateY;
          canvas.classList.add("grabbing");
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        if (isDragging) {
          translateX = e.clientX - startX;
          translateY = e.clientY - startY;
          updateTransform();
        }
      });

      canvas.addEventListener("mouseup", () => {
        isDragging = false;
        canvas.classList.remove("grabbing");
      });

      canvas.addEventListener("mouseleave", () => {
        isDragging = false;
        canvas.classList.remove("grabbing");
      });

      canvas.addEventListener(
        "wheel",
        (e) => {
          if (e.metaKey || e.ctrlKey) {
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const graphX = (mouseX - translateX) / scale;
            const graphY = (mouseY - translateY) / scale;

            const delta = e.deltaY > 0 ? -0.01 : 0.01;
            const newScale = Math.max(
              MIN_SCALE,
              Math.min(MAX_SCALE, scale + delta),
            );

            translateX = mouseX - graphX * newScale;
            translateY = mouseY - graphY * newScale;

            scale = newScale;
            updateTransform();
            document.getElementById("zoomLevel").textContent =
              `${Math.round(scale * 100)}%`;
          } else {
            e.preventDefault();
            translateX -= e.deltaX * 0.5;
            translateY -= e.deltaY * 0.5;
            updateTransform();
          }
        },
        { passive: false },
      );

      // Initialize
      if (roadmapData && roadmapData.files && roadmapData.files.length > 0) {
        console.log(`✅ Found ${roadmapData.files.length} files`);
        renderGraph();

        setTimeout(() => {
          resetView();
        }, 100);

        setTimeout(() => {
          const hint = document.getElementById("hint");
          hint.style.opacity = "0";
          setTimeout(() => (hint.style.display = "none"), 300);
        }, 5000);
      } else {
        console.error("❌ No files found");
        document.getElementById("nodesContainer").innerHTML =
          '<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #666;"><div style="font-size: 64px; margin-bottom: 16px;">📭</div><h3>No files found</h3><p>Make sure you have TypeScript files in your workspace</p></div>';
      }
    </script>
  </body>
</html>
