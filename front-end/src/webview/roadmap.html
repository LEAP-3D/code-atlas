<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        overflow: hidden;
      }

      .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: #1a1a1a;
        padding: 16px 24px;
        border-bottom: 1px solid #333;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-left h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .breadcrumb {
        font-size: 12px;
        color: #888;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      .breadcrumb-item {
        cursor: pointer;
        transition: color 0.2s;
      }

      .breadcrumb-item:hover {
        color: #4ec9b0;
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .zoom-controls {
        display: flex;
        gap: 4px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 4px;
      }

      .zoom-btn {
        background: transparent;
        border: none;
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .zoom-btn:hover {
        background: #3a3a3a;
      }

      .zoom-level {
        color: #888;
        font-size: 12px;
        padding: 0 8px;
        min-width: 50px;
        text-align: center;
      }

      .reset-btn {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .reset-btn:hover {
        background: #3a3a3a;
        border-color: #4ec9b0;
      }

      .canvas {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        cursor: grab;
      }

      .canvas.grabbing {
        cursor: grabbing;
      }

      .graph-container {
        position: absolute;
        width: 10000px;
        height: 10000px;
        left: 50%;
        top: 50%;
        transform-origin: center center;
      }

      svg.connections {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .connection-line {
        stroke: #4a4a4a;
        stroke-width: 2;
        fill: none;
        transition:
          stroke 0.3s,
          stroke-width 0.3s;
        opacity: 0.6;
      }

      .connection-line.highlight {
        stroke: #4ec9b0;
        stroke-width: 3;
        opacity: 1;
      }

      .connection-line.dependency-line {
        stroke: #10b981;
        stroke-width: 2.5;
        stroke-dasharray: 5, 5;
      }

      .connection-arrow {
        fill: #4a4a4a;
        transition: fill 0.3s;
      }

      .connection-line.highlight + .connection-arrow {
        fill: #4ec9b0;
      }

      .nodes-layer {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .node {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          opacity 0.3s,
          transform 0.3s;
        z-index: 2;
      }

      .node.focused {
        z-index: 5;
      }

      .node.dimmed {
        opacity: 0.2;
      }

      .node-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
        border: 3px solid #3a3a3a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: all 0.3s;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      .node:hover .node-circle {
        transform: scale(1.15);
        box-shadow: 0 12px 40px rgba(78, 201, 176, 0.3);
      }

      .node.focused .node-circle {
        width: 140px;
        height: 140px;
        border-color: #4ec9b0;
        box-shadow: 0 16px 64px rgba(78, 201, 176, 0.5);
      }

      .node.small .node-circle {
        width: 70px;
        height: 70px;
      }

      .node.folder .node-circle {
        border-color: #f59e0b;
      }

      .node.file .node-circle {
        border-color: #3b82f6;
      }

      .node.file.has-error .node-circle {
        border-color: #ef4444;
        background: linear-gradient(135deg, #2a1a1a 0%, #3a2020 100%);
        box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
      }

      .node.file.has-error:hover .node-circle {
        box-shadow: 0 12px 40px rgba(239, 68, 68, 0.5);
      }

      .node.file.has-error .node-badge {
        background: rgba(239, 68, 68, 0.3);
        color: #ef4444;
      }

      .node.dependency .node-circle {
        width: 110px;
        height: 110px;
        border-color: #10b981;
        background: linear-gradient(135deg, #1a2e1a 0%, #2a3a2a 100%);
        box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
      }

      .node.dependency:hover .node-circle {
        box-shadow: 0 12px 40px rgba(16, 185, 129, 0.5);
      }

      .node.dependency .node-badge {
        background: rgba(16, 185, 129, 0.3);
        color: #10b981;
      }

      .node-icon {
        font-size: 40px;
        margin-bottom: 4px;
        transition: all 0.3s;
      }

      .node.focused .node-icon {
        font-size: 56px;
      }

      .node.small .node-icon {
        font-size: 28px;
        margin-bottom: 0;
      }

      .node-name {
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        text-align: center;
        max-width: 90px;
        word-break: break-word;
        transition: all 0.3s;
        line-height: 1.2;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .node.focused .node-name {
        font-size: 14px;
        max-width: 130px;
        -webkit-line-clamp: 3;
      }

      .node.small .node-name {
        font-size: 8px;
        max-width: 60px;
        line-height: 1.1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .node-badge {
        position: absolute;
        top: 4px;
        right: 4px;
        background: rgba(78, 201, 176, 0.2);
        color: #4ec9b0;
        padding: 3px 7px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }

      .node.small .node-badge {
        font-size: 7px;
        padding: 1px 4px;
        top: 2px;
        right: 2px;
      }

      .error-badge-indicator {
        position: absolute;
        top: -8px;
        left: -8px;
        background: #ef4444;
        color: white;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: bold;
        z-index: 10;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      .hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(26, 26, 26, 0.95);
        border: 1px solid #3a3a3a;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 12px;
        color: #888;
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.3s;
      }

      .function-panel {
        position: fixed;
        right: -400px;
        top: 70px;
        bottom: 20px;
        width: 380px;
        background: #1a1a1a;
        border: 1px solid #3a3a3a;
        border-radius: 12px;
        padding: 24px;
        overflow-y: auto;
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 20;
        box-shadow: -8px 0 32px rgba(0, 0, 0, 0.5);
      }

      .function-panel.visible {
        right: 20px;
      }

      .function-panel-header {
        margin-bottom: 20px;
      }

      .function-panel-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .function-panel-subtitle {
        font-size: 12px;
        color: #888;
      }

      .close-panel {
        position: absolute;
        top: 16px;
        right: 16px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
      }

      .close-panel:hover {
        background: #3a3a3a;
        border-color: #4ec9b0;
      }

      .function-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .function-card {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.2s;
        cursor: pointer;
      }

      .function-card:hover {
        background: rgba(78, 201, 176, 0.1);
        border-color: #4ec9b0;
        transform: translateX(4px);
      }

      .function-card:active {
        transform: translateX(2px) scale(0.98);
      }

      .function-icon {
        font-size: 20px;
      }

      .function-details {
        flex: 1;
        min-width: 0;
      }

      .function-name {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .function-meta {
        font-size: 10px;
        color: #888;
      }

      .function-goto {
        color: #4ec9b0;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .function-card:hover .function-goto {
        opacity: 1;
      }

      .canvas::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
      }

      .error-warning {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid #ef4444;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .error-warning:hover {
        background: rgba(239, 68, 68, 0.25);
        border-color: #f87171;
        transform: scale(1.02);
      }

      .error-warning-icon {
        font-size: 24px;
      }

      .error-warning-text {
        flex: 1;
      }

      .error-warning-title {
        font-size: 14px;
        font-weight: 600;
        color: #ef4444;
        margin-bottom: 4px;
      }

      .error-warning-subtitle {
        font-size: 12px;
        color: #fca5a5;
        font-weight: 600;
      }

      .dependencies-section {
        margin-bottom: 24px;
        padding-bottom: 24px;
        border-bottom: 1px solid #3a3a3a;
      }

      .functions-section {
        margin-top: 24px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dep-subsection {
        margin-bottom: 16px;
      }

      .dep-subtitle {
        font-size: 12px;
        font-weight: 600;
        color: #888;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .dep-item {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .dep-item:hover {
        background: rgba(78, 201, 176, 0.1);
        border-color: #4ec9b0;
        transform: translateX(4px);
      }

      .dep-item:active {
        transform: translateX(2px) scale(0.98);
      }

      .dep-icon {
        font-size: 16px;
        flex-shrink: 0;
      }

      .dep-details {
        flex: 1;
        min-width: 0;
      }

      .dep-file-name {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .dep-imported-names {
        font-size: 10px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .dep-arrow {
        color: #4ec9b0;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.2s;
        flex-shrink: 0;
      }

      .dep-item:hover .dep-arrow {
        opacity: 1;
      }

      .no-deps {
        color: #666;
        font-size: 12px;
        padding: 12px;
        text-align: center;
        font-style: italic;
      }

      /* ERROR DETAIL PANEL */
      .error-detail-panel {
        position: fixed;
        right: -450px;
        top: 70px;
        bottom: 20px;
        width: 430px;
        background: #1a1a1a;
        border: 2px solid #ef4444;
        border-radius: 12px;
        padding: 24px;
        overflow-y: auto;
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 25;
        box-shadow: -8px 0 32px rgba(239, 68, 68, 0.4);
      }

      .error-detail-panel.visible {
        right: 20px;
      }

      .error-panel-header {
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid #3a3a3a;
      }

      .error-panel-title {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .error-icon-large {
        font-size: 32px;
      }

      .error-panel-title-text {
        font-size: 18px;
        font-weight: 600;
        color: #ef4444;
        margin-bottom: 4px;
      }

      .error-panel-subtitle {
        font-size: 13px;
        color: #888;
      }

      .error-panel-content {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .error-section {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 16px;
      }

      .error-section-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .error-message-box {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid #ef4444;
        border-radius: 6px;
        padding: 12px;
        font-size: 13px;
        line-height: 1.5;
        color: #fca5a5;
        font-family: "Courier New", monospace;
      }

      .error-location {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .error-location:hover {
        background: rgba(78, 201, 176, 0.1);
        border-color: #4ec9b0;
        transform: translateX(4px);
      }

      .error-location-icon {
        font-size: 24px;
      }

      .error-location-details {
        flex: 1;
        min-width: 0;
      }

      .error-location-file {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 4px;
      }

      .error-location-line {
        font-size: 12px;
        color: #888;
        margin-bottom: 2px;
      }

      .error-location-function {
        font-size: 11px;
        color: #4ec9b0;
      }

      .error-suggestion {
        font-size: 13px;
        line-height: 1.6;
        color: #4ec9b0;
        background: rgba(78, 201, 176, 0.1);
        border-left: 3px solid #4ec9b0;
        padding: 12px;
        border-radius: 4px;
      }

      .error-related-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .error-related-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .error-related-item:hover {
        background: rgba(78, 201, 176, 0.1);
        border-color: #4ec9b0;
        transform: translateX(4px);
      }

      .error-related-icon {
        font-size: 18px;
      }

      .error-related-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        color: #e0e0e0;
      }

      .btn-debug-flow {
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-debug-flow:hover {
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
      }

      .btn-debug-flow:active {
        transform: translateY(0);
      }

      .close-error-panel {
        position: absolute;
        top: 16px;
        right: 16px;
        background: #2a2a2a;
        border: 1px solid #ef4444;
        color: #ef4444;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
        z-index: 10;
      }

      .close-error-panel:hover {
        background: #ef4444;
        color: white;
        transform: rotate(90deg);
      }

      .error-goto {
        color: #4ec9b0;
        font-size: 18px;
        opacity: 0.7;
        transition: all 0.2s;
      }

      .error-location:hover .error-goto {
        opacity: 1;
        transform: translateX(4px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-left">
          <h1>🗺️ Project Map</h1>
          <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item" onclick="resetView()">Full Map</span>
          </div>
        </div>
        <div class="controls">
          <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomOut()">−</button>
            <div class="zoom-level" id="zoomLevel">50%</div>
            <button class="zoom-btn" onclick="zoomIn()">+</button>
          </div>
          <button class="reset-btn" onclick="resetView()">Reset View</button>
        </div>
      </div>

      <div class="canvas" id="canvas">
        <div class="graph-container" id="graphContainer">
          <svg class="connections" id="connectionsSvg">
            <defs>
              <marker
                id="arrowhead"
                markerWidth="10"
                markerHeight="10"
                refX="9"
                refY="3"
                orient="auto"
              >
                <polygon points="0 0, 10 3, 0 6" class="connection-arrow" />
              </marker>
              <marker
                id="arrowhead-highlight"
                markerWidth="10"
                markerHeight="10"
                refX="9"
                refY="3"
                orient="auto"
              >
                <polygon points="0 0, 10 3, 0 6" fill="#4ec9b0" />
              </marker>
            </defs>
          </svg>
          <div class="nodes-layer" id="nodesContainer"></div>
        </div>
      </div>

      <!-- Error Detail Panel -->
      <div class="error-detail-panel" id="errorDetailPanel">
        <button class="close-error-panel" onclick="closeErrorPanel()">×</button>
        <div class="error-panel-header" id="errorPanelHeader"></div>
        <div class="error-panel-content" id="errorPanelContent"></div>
      </div>

      <!-- Function Panel -->
      <div class="function-panel" id="functionPanel">
        <button class="close-panel" onclick="closeFunctionPanel()">×</button>
        <div class="function-panel-header" id="panelHeader"></div>
        <div class="function-list" id="functionList"></div>
      </div>

      <div class="hint" id="hint">
        🖱️ Drag • Cmd+Scroll zoom • Click files • 🔴 Errors • 🟢 Dependencies
      </div>
    </div>

    <script>
      const vscode = acquireVsCodeApi();

      function goToFunction(filePath, line) {
        console.log("🎯 Going to:", filePath, line);
        vscode.postMessage({
          command: "goToFunction",
          filePath: filePath,
          line: line || 1,
        });
      }

      function escapeHtml(text) {
        if (!text) return "";
        return text
          .replace(/\\/g, "\\\\")

      function requestErrorDetails(filePath) {

      function openDebugFlow(filePath, functionName) {

          command: "searchFunction",

      window.addEventListener("message", (event) => {
        const message = event.data;
        if (message.command === "displayErrorDetails") {
          console.log("📥 Error details:", message.errors);
          if (message.errors && message.errors.length > 0) {
            showErrorDetail(message.errors[0]);
          }

      });

      let roadmapData = window.ROADMAP_DATA || { files: [], dependencies: [] };
      console.log(
        "🗺️ Roadmap:",
        roadmapData.files.length,
        "files",
        roadmapData.dependencies?.length || 0,
        "deps",
      );

      let hierarchyData = null;
      let allNodes = [];
      let connections = [];
      let focusedFile = null;
      let scale = 0.5;
      let translateX = 0;
      let translateY = 0;
      let isDragging = false;
      let startX = 0;
      let startY = 0;

      const MIN_SCALE = 0.1;
      const MAX_SCALE = 3;
      const ZOOM_STEP = 0.15;

      function buildHierarchy(files) {
        const basePath = findBasePath(files);
        const pathParts = basePath ? basePath.split("/").filter((p) => p) : [];
        const projectName =
          pathParts.length > 0 ? pathParts[pathParts.length - 1] : "Project";

        const root = {
          name: projectName,
          type: "folder",
          children: {},
          files: [],
          level: 0,
          path: projectName,
          parent: null,
        };

        files.forEach((file) => {
          let relativePath = file.path.replace(/\\/g, "/");

          if (basePath) {
            const baseWithSlash = basePath.endsWith("/")
              ? basePath
              : basePath + "/";
            if (relativePath.startsWith(baseWithSlash)) {
              relativePath = relativePath.substring(baseWithSlash.length);
            } else if (relativePath.startsWith(basePath)) {
              relativePath = relativePath.substring(basePath.length);
              if (relativePath.startsWith("/"))
                relativePath = relativePath.substring(1);
            }
          }

          const parts = relativePath.split("/").filter((p) => p);
          if (parts.length === 0) return;

          let current = root;
          let currentLevel = 0;

          for (let i = 0; i < parts.length - 1; i++) {
            const folderName = parts[i];
            if (!current.children[folderName]) {
              current.children[folderName] = {
                name: folderName,
                type: "folder",
                children: {},
                files: [],
                parent: current,
                level: currentLevel + 1,
                path: parts.slice(0, i + 1).join("/"),
              };
            }
            current = current.children[folderName];
            currentLevel++;
          }

          const fileName = parts[parts.length - 1];
          current.files.push({
            name: fileName,
            type: "file",
            fullPath: file.path,
            functions: file.functions || [],
            parent: current,
            level: currentLevel + 1,
            path: relativePath,
            errorCount: file.errorCount || 0,
            color: file.color,
          });
        });

        const childFolders = Object.keys(root.children);
        if (childFolders.length === 1 && root.files.length === 0) {
          const onlyChild = root.children[childFolders[0]];
          onlyChild.parent = null;
          onlyChild.level = 0;
          return onlyChild;
        }

        return root;
      }

      function findBasePath(files) {
        if (files.length === 0) return "";
        const paths = files.map((f) => f.path.replace(/\\/g, "/"));
        const parts = paths[0].split("/").filter((p) => p);
        let commonParts = [];

        for (let i = 0; i < parts.length; i++) {
          const testPath = "/" + parts.slice(0, i + 1).join("/");
          if (paths.every((p) => p.startsWith(testPath + "/"))) {
            commonParts = parts.slice(0, i + 1);
          } else break;
        }

        return "/" + commonParts.join("/");
      }

      function calculateTreeLayout(
        node,
        startX = 5000,
        startY = 500,
        level = 0,
      ) {
        const positions = [];
        const spacing = { h: 180, v: 250 };
        const folders = Object.values(node.children || {});
        const files = node.files || [];
        const allItems = [...folders, ...files];

        if (allItems.length === 0) return positions;

        function calcWidth(item) {
          if (item.type === "file") return spacing.h;
          const subItems = [
            ...Object.values(item.children || {}),
            ...(item.files || []),
          ];
          if (subItems.length === 0) return spacing.h;
          return Math.max(
            subItems.reduce((sum, sub) => sum + calcWidth(sub), 0),
            spacing.h,
          );
        }

        const widths = allItems.map(calcWidth);
        const totalWidth = widths.reduce((a, b) => a + b, 0);
        let currentX = startX - totalWidth / 2;

        allItems.forEach((item, i) => {
          const itemX = currentX + widths[i] / 2;
          positions.push({
            node: item,
            x: itemX,
            y: startY + spacing.v,
            level: level + 1,
            parentX: startX,
            parentY: startY,
          });

          if (item.type === "folder") {
            positions.push(
              ...calculateTreeLayout(
                item,
                itemX,
                startY + spacing.v,
                level + 1,
              ),
            );
          }

          currentX += widths[i];
        });

        return positions;
      }

      function renderGraph() {
        const nodesContainer = document.getElementById("nodesContainer");
        const svg = document.getElementById("connectionsSvg");

        nodesContainer.innerHTML = "";
        const defs = svg.querySelector("defs");
        svg.innerHTML = "";
        if (defs) svg.appendChild(defs);

        allNodes = [];
        connections = [];

        hierarchyData = buildHierarchy(roadmapData.files);
        const positions = calculateTreeLayout(hierarchyData);

        const rootEl = createNode(hierarchyData, 5000, 500);
        nodesContainer.appendChild(rootEl);
        allNodes.push({
          element: rootEl,
          data: hierarchyData,
          x: 5000,
          y: 500,
        });

        positions.forEach((pos) => {
          if (pos.parentX !== undefined) {
            drawConnection(
              pos.parentX,
              pos.parentY,
              pos.x,
              pos.y,
              getNodeId(pos.node),
              getNodeId(pos.node.parent),
            );
          }
        });

        positions.forEach((pos) => {
          const el = createNode(pos.node, pos.x, pos.y);
          nodesContainer.appendChild(el);
          allNodes.push({ element: el, data: pos.node, x: pos.x, y: pos.y });
        });

        console.log("✅ Rendered", allNodes.length, "nodes");
      }

      function getNodeId(node) {
        if (!node) return null;
        return node.type === "folder"
          ? `folder-${node.path || node.name}`
          : `file-${node.path}`;
      }

      function createNode(data, x, y) {
        const node = document.createElement("div");
        node.className = `node ${data.type}`;
        if (data.type === "file" && data.errorCount > 0)
          node.classList.add("has-error");

        node.style.left = `${x}px`;
        node.style.top = `${y}px`;
        node.style.transform = "translate(-50%, -50%)";

        const icon = data.type === "folder" ? "📁" : "📄";
        const badge =
          data.type === "folder"
            ? countFiles(data)
            : data.functions?.length || 0;
        const errorInd =
          data.type === "file" && data.errorCount > 0
            ? '<div class="error-badge-indicator">!</div>'
            : "";

        node.innerHTML = `
          <div class="node-circle">
            ${errorInd}
            ${badge > 0 ? `<div class="node-badge">${badge}</div>` : ""}
            <div class="node-icon">${icon}</div>
            <div class="node-name">${data.name}</div>
          </div>
        `;

        if (data.type === "file") {
          node.onclick = (e) => {
            e.stopPropagation();
            focusOnFile(data);
          };
        }

        return node;
      }

      function countFiles(folder) {
        let count = folder.files?.length || 0;
        Object.values(folder.children || {}).forEach((c) => {
          count += countFiles(c);
        });
        return count;
      }

      function drawConnection(x1, y1, x2, y2, childId, parentId) {
        const svg = document.getElementById("connectionsSvg");
        const path = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path",
        );
        const midY = (y1 + y2) / 2;
        path.setAttribute(
          "d",
          `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`,
        );
        path.setAttribute("marker-end", "url(#arrowhead)");
        path.classList.add("connection-line");
        path.dataset.childId = childId;
        path.dataset.parentId = parentId;
        svg.appendChild(path);
        connections.push({ line: path, childId, parentId });
      }

      function focusOnFile(fileData) {
        console.log("🎯 Focus:", fileData.name);

        focusedFile = fileData;

        const relevantNodeIds = new Set();
        const dependencyNodeIds = new Set();

        relevantNodeIds.add(getNodeId(fileData));

        let current = fileData.parent;
        while (current && current.name !== "Root") {
          relevantNodeIds.add(getNodeId(current));
          current = current.parent;
        }

        const deps = roadmapData.dependencies || [];
        const imports = deps.filter(
          (d) => d.importerFilePath === fileData.fullPath,
        );
        const importedBy = deps.filter(
          (d) => d.importedFilePath === fileData.fullPath,
        );

        console.log(
          "  📥",
          imports.length,
          "imports  📤",
          importedBy.length,
          "importedBy",
        );

        imports.forEach((dep) => {
          const node = findFileNodeByPath(dep.importedFilePath);
          if (node) dependencyNodeIds.add(getNodeId(node));
        });

        importedBy.forEach((dep) => {
          const node = findFileNodeByPath(dep.importerFilePath);
          if (node) dependencyNodeIds.add(getNodeId(node));
        });

        allNodes.forEach((nodeObj) => {
          const nodeId = getNodeId(nodeObj.data);
          const isFile = nodeId === getNodeId(fileData);
          const isInPath = relevantNodeIds.has(nodeId) && !isFile;
          const isDep = dependencyNodeIds.has(nodeId);

          nodeObj.element.classList.remove(
            "focused",
            "dimmed",
            "small",
            "dependency",
          );

          if (isFile) nodeObj.element.classList.add("focused");
          else if (isDep) nodeObj.element.classList.add("dependency");
          else if (isInPath) nodeObj.element.classList.add("small");
          else nodeObj.element.classList.add("dimmed");
        });

        connections.forEach(({ line, childId, parentId }) => {
          const bothInPath =
            relevantNodeIds.has(childId) &&
            parentId &&
            relevantNodeIds.has(parentId);
          const childIsDep = dependencyNodeIds.has(childId);
          const parentIsDep = dependencyNodeIds.has(parentId);
          const connectsToDep =
            (childId === getNodeId(fileData) && parentIsDep) ||
            (parentId === getNodeId(fileData) && childIsDep) ||
            (childIsDep && relevantNodeIds.has(parentId)) ||
            (parentIsDep && relevantNodeIds.has(childId));

          line.classList.remove("highlight", "dependency-line");

          if (bothInPath) {
            line.classList.add("highlight");
            line.setAttribute("marker-end", "url(#arrowhead-highlight)");
          } else if (connectsToDep) {
            line.classList.add("dependency-line");
          } else {
            line.setAttribute("marker-end", "url(#arrowhead)");
          }
        });

        showFunctionPanel(fileData);

        const pathParts = [];
        current = fileData;
        while (current) {
          pathParts.unshift(current.name);
          current = current.parent;
        }
        updateBreadcrumb(pathParts.join(" / "));
      }

      function findFileNodeByPath(filePath) {
        function search(node) {
          if (node.type === "file" && node.fullPath === filePath) return node;
          if (node.files) {
            for (const f of node.files) {
              if (f.fullPath === filePath) return f;
            }
          }
          if (node.children) {
            for (const c of Object.values(node.children)) {
              const found = search(c);
              if (found) return found;
            }
          }
          return null;
        }
        return search(hierarchyData);
      }

      function showFunctionPanel(fileData) {
        const panel = document.getElementById("functionPanel");
        const header = document.getElementById("panelHeader");
        const list = document.getElementById("functionList");

        const deps = roadmapData.dependencies || [];
        const imports = deps.filter(
          (d) => d.importerFilePath === fileData.fullPath,
        );
        const importedBy = deps.filter(
          (d) => d.importedFilePath === fileData.fullPath,
        );

        const errWarn =
          fileData.errorCount > 0
            ? `
          <div class="error-warning" onclick="requestErrorDetails('${escapeHtml(fileData.fullPath)}')">
            <div class="error-warning-icon">⚠️</div>
            <div class="error-warning-text">
              <div class="error-warning-title">${fileData.errorCount} Error${fileData.errorCount > 1 ? "s" : ""}</div>
              <div class="error-warning-subtitle">Click to see details →</div>
            </div>
          </div>`
            : "";

        header.innerHTML = `
          <div class="function-panel-title">📄 ${fileData.name}</div>
          <div class="function-panel-subtitle">${fileData.functions?.length || 0} functions</div>
          ${errWarn}
        `;

        const depsSection = `
          <div class="dependencies-section">
            <div class="section-title">🔗 Dependencies</div>
            ${
              imports.length > 0
                ? `
              <div class="dep-subsection">
                <div class="dep-subtitle">📥 Imports (${imports.length})</div>
                ${imports
                  .map(
                    (d) => `
                  <div class="dep-item" onclick="jumpToFile('${d.importedFilePath.replace(/\\/g, "\\\\")}')">
                    <div class="dep-icon">📄</div>
                    <div class="dep-details">
                      <div class="dep-file-name">${d.importedFilePath.split("/").pop()}</div>
                      <div class="dep-imported-names">${d.importedNames.join(", ")}</div>
                    </div>
                    <div class="dep-arrow">→</div>
                  </div>
                `,
                  )
                  .join("")}
              </div>`
                : ""
            }
            ${
              importedBy.length > 0
                ? `
              <div class="dep-subsection">
                <div class="dep-subtitle">📤 Imported by (${importedBy.length})</div>
                ${importedBy
                  .map(
                    (d) => `
                  <div class="dep-item" onclick="jumpToFile('${d.importerFilePath.replace(/\\/g, "\\\\")}')">
                    <div class="dep-icon">📄</div>
                    <div class="dep-details">
                      <div class="dep-file-name">${d.importerFilePath.split("/").pop()}</div>
                      <div class="dep-imported-names">${d.importedNames.join(", ")}</div>
                    </div>
                    <div class="dep-arrow">→</div>
                  </div>
                `,
                  )
                  .join("")}
              </div>`
                : ""
            }
            ${imports.length === 0 && importedBy.length === 0 ? '<div class="no-deps">No dependencies</div>' : ""}
          </div>
        `;

        const funcSection = `
          <div class="functions-section">
            <div class="section-title">⚡ Functions (${fileData.functions?.length || 0})</div>
            ${
              fileData.functions
                ?.map(
                  (fn) => `
              <div class="function-card" onclick="goToFunction('${fileData.fullPath.replace(/\\/g, "\\\\")}', ${fn.startLine || 1})">
                <div class="function-icon">${getFunctionIcon(fn.name)}</div>
                <div class="function-details">
                  <div class="function-name">${fn.name}</div>
                  <div class="function-meta">${fn.startLine ? `Line ${fn.startLine}` : ""}${fn.calls?.length > 0 ? ` • Calls: ${fn.calls.slice(0, 2).join(", ")}${fn.calls.length > 2 ? "..." : ""}` : ""}</div>
                </div>
                <div class="function-goto">→</div>
              </div>
            `,
                )
                .join("") ||
              '<p style="color:#666;padding:12px">No functions</p>'
            }
          </div>
        `;

        list.innerHTML = depsSection + funcSection;
        panel.classList.add("visible");
      }

      function jumpToFile(filePath) {
        console.log("🎯 Jump:", filePath);
        const node = findFileNodeByPath(filePath);
        if (node) {
          focusOnFile(node);
          const nodeObj = allNodes.find(
            (n) => getNodeId(n.data) === getNodeId(node),
          );
          if (nodeObj) {
            const rect = canvas.getBoundingClientRect();
            translateX = rect.width / 2 - (nodeObj.x - 5000) * scale;
            translateY = rect.height / 2 - (nodeObj.y - 5000) * scale;
            updateTransform();
          }
        }
      }

      function closeFunctionPanel() {
        document.getElementById("functionPanel").classList.remove("visible");
        resetView();
      }

      function getFunctionIcon(name) {
        const l = name.toLowerCase();
        if (l.startsWith("use")) return "🪝";
        if (l.startsWith("handle")) return "🎯";
        if (l.includes("fetch") || l.includes("api")) return "📡";
        if (l.includes("render")) return "🎨";
        if (l.includes("analyze") || l.includes("build")) return "⚙️";
        return "⚡";
      }

      function resetView() {
        focusedFile = null;

        if (allNodes.length > 0) {
          let minX = Infinity,
            maxX = -Infinity,
            minY = Infinity,
            maxY = -Infinity;
          allNodes.forEach((n) => {
            minX = Math.min(minX, n.x);
            maxX = Math.max(maxX, n.x);
            minY = Math.min(minY, n.y);
            maxY = Math.max(maxY, n.y);
          });

          const gw = maxX - minX + 200,
            gh = maxY - minY + 200;
          const gcx = (minX + maxX) / 2,
            gcy = (minY + maxY) / 2;
          const rect = canvas.getBoundingClientRect();
          const ccx = rect.width / 2,
            ccy = rect.height / 2;

          scale = Math.max(
            MIN_SCALE,
            Math.min((rect.width * 0.9) / gw, (rect.height * 0.9) / gh, 1),
          );
          translateX = ccx - (gcx - 5000) * scale;
          translateY = ccy - (gcy - 5000) * scale;
        } else {
          scale = 0.5;
          translateX = translateY = 0;
        }

        allNodes.forEach((n) =>
          n.element.classList.remove(
            "focused",
            "dimmed",
            "small",
            "dependency",
          ),
        );
        connections.forEach(({ line }) => {
          line.classList.remove("highlight", "dependency-line");
          line.setAttribute("marker-end", "url(#arrowhead)");
        });

        updateTransform();
        document.getElementById("zoomLevel").textContent =
          `${Math.round(scale * 100)}%`;
        updateBreadcrumb("Full Map");
        document.getElementById("functionPanel").classList.remove("visible");
      }

      function updateBreadcrumb(text) {
        document.getElementById("breadcrumb").innerHTML =
          `<span class="breadcrumb-item" onclick="resetView()">${text}</span>`;
      }

      function zoomIn() {
        setZoom(Math.min(scale + ZOOM_STEP, MAX_SCALE));
      }
      function zoomOut() {
        setZoom(Math.max(scale - ZOOM_STEP, MIN_SCALE));
      }

      function setZoom(newScale) {
        scale = newScale;
        updateTransform();
        document.getElementById("zoomLevel").textContent =
          `${Math.round(scale * 100)}%`;
      }

      function updateTransform() {
        document.getElementById("graphContainer").style.transform =
          `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
      }

      const canvas = document.getElementById("canvas");

      canvas.addEventListener("mousedown", (e) => {
        if (e.target === canvas || e.target.closest("#graphContainer")) {
          isDragging = true;
          startX = e.clientX - translateX;
          startY = e.clientY - translateY;
          canvas.classList.add("grabbing");
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        if (isDragging) {
          translateX = e.clientX - startX;
          translateY = e.clientY - startY;
          updateTransform();
        }
      });

      canvas.addEventListener("mouseup", () => {
        isDragging = false;
        canvas.classList.remove("grabbing");
      });

      canvas.addEventListener("mouseleave", () => {
        isDragging = false;
        canvas.classList.remove("grabbing");
      });

      canvas.addEventListener(
        "wheel",
        (e) => {
          if (e.metaKey || e.ctrlKey) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left,
              my = e.clientY - rect.top;
            const gx = (mx - translateX) / scale,
              gy = (my - translateY) / scale;
            const delta = e.deltaY > 0 ? -0.01 : 0.01;
            const newScale = Math.max(
              MIN_SCALE,
              Math.min(MAX_SCALE, scale + delta),
            );
            translateX = mx - gx * newScale;
            translateY = my - gy * newScale;
            scale = newScale;
            updateTransform();
            document.getElementById("zoomLevel").textContent =
              `${Math.round(scale * 100)}%`;
          } else {
            e.preventDefault();
            translateX -= e.deltaX * 0.5;
            translateY -= e.deltaY * 0.5;
            updateTransform();
          }
        },
        { passive: false },
      );

      if (roadmapData?.files?.length > 0) {
        console.log("✅ Init:", roadmapData.files.length, "files");
        renderGraph();
        setTimeout(resetView, 100);
        setTimeout(() => {
          const h = document.getElementById("hint");
          h.style.opacity = "0";
          setTimeout(() => (h.style.display = "none"), 300);
        }, 5000);
      } else {
        console.error("❌ No files");
        document.getElementById("nodesContainer").innerHTML =
          '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#666"><div style="font-size:64px;margin-bottom:16px">📭</div><h3>No files</h3></div>';
      }
    </script>
  </body>
</html>
