<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Roadmap</title>
    <link rel="stylesheet" href="{{STYLES_URI}}" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <h1>🗺️ Project Map</h1>
          <div class="breadcrumb" id="breadcrumb">
            <span
              class="breadcrumb-item"
              onclick="window.roadmapActions.resetView()"
              >Full Map</span
            >
          </div>
        </div>
        <div class="controls">
          <div class="search-controls">
            <input
              type="text"
              id="roadmapSearchInput"
              class="search-input"
              placeholder="Search file/folder..."
            />
            <button
              class="search-clear-btn"
              id="roadmapSearchClearBtn"
              title="Clear search"
              onclick="window.roadmapActions.clearSearch()"
            >
              ×
            </button>
            <div class="search-meta" id="roadmapSearchMeta"></div>
          </div>
          <div class="zoom-controls">
            <button class="zoom-btn" onclick="window.roadmapActions.zoomOut()">
              −
            </button>
            <div class="zoom-level" id="zoomLevel">50%</div>
            <button class="zoom-btn" onclick="window.roadmapActions.zoomIn()">
              +
            </button>
          </div>
          <button
            class="reset-btn"
            id="refreshRoadmapBtn"
            onclick="window.roadmapActions.refreshRoadmap()"
          >
            Refresh Errors
          </button>
          <button class="reset-btn" onclick="window.roadmapActions.resetView()">
            Reset View
          </button>
        </div>
      </div>

      <!-- Canvas -->
      <div class="canvas" id="canvas">
        <div class="graph-container" id="graphContainer">
          <svg class="connections" id="connectionsSvg"></svg>
          <div class="nodes-layer" id="nodesContainer"></div>
        </div>
      </div>

      <!-- Function Panel -->
      <div class="function-panel" id="functionPanel">
        <button
          class="close-panel"
          onclick="window.roadmapActions.clearFileSelection()"
        >
          ×
        </button>
        <div class="function-panel-header" id="panelHeader"></div>
        <div class="function-list" id="functionList"></div>
      </div>
      <button
        class="panel-toggle"
        id="panelToggle"
        onclick="window.roadmapActions.toggleFunctionPanel()"
        aria-label="Toggle sidebar"
      ></button>

      <!-- Hint -->
      <div class="map-legend" id="mapLegend" aria-label="Connection legend">
        <button
          class="map-legend-close"
          type="button"
          aria-label="Close legend"
          onclick="document.getElementById('mapLegend')?.classList.add('is-hidden'); document.getElementById('mapLegendToggle')?.classList.remove('is-hidden')"
        >
          ×
        </button>
        <div class="map-legend-title">Lines</div>
        <div class="map-legend-item">
          <span class="map-legend-line default"></span>
          <span>Default tree connection</span>
        </div>
        <div class="map-legend-item">
          <span class="map-legend-line direct"></span>
          <span>Direct path to selected file/folder</span>
        </div>
        <div class="map-legend-item">
          <span class="map-legend-line import"></span>
          <span>Imports (selected file uses these files)</span>
        </div>
        <div class="map-legend-item">
          <span class="map-legend-line imported-by"></span>
          <span>Imported by (these files use the selected file)</span>
        </div>
      </div>
      <button
        class="map-legend-toggle is-hidden"
        id="mapLegendToggle"
        type="button"
        aria-label="Show legend"
        onclick="document.getElementById('mapLegend')?.classList.remove('is-hidden'); document.getElementById('mapLegendToggle')?.classList.add('is-hidden')"
      >
        Show line legend
      </button>
      <div class="hint" id="hint">
        🖱️ Drag • Cmd+Scroll zoom • Click files • 🔴 Red = Errors • 🟢 Green =
        Dependencies
      </div>
    </div>

    <!-- Data injection point -->
    {{DATA_SCRIPT}}

    <!-- Main script -->
    <script src="{{SCRIPT_URI}}"></script>
  </body>
</html>
